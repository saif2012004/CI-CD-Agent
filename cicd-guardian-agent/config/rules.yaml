# CI/CD Guardian Agent Configuration
# All policies are fully configurable

branch_protection:
  # Branches that require special protection
  protected_branches:
    - main
    - master
    - develop
  
  # Require pull request for protected branches
  require_pull_request: true
  
  # Minimum number of PR approvals required
  min_approvals: 1

test_coverage:
  # Minimum test coverage percentage required
  minimum_percentage: 80

# Diff-based policy checks (signals computed in CI)
policy:
  # Flag changed files larger than this many megabytes
  max_file_size_mb: 5

notifications:
  # Slack webhook URL for notifications.
  # Leave as null and set the SLACK_WEBHOOK_URL environment variable instead,
  # so the secret never lives in this file. The env var takes precedence.
  slack_webhook: null

  # Discord / Microsoft Teams incoming webhooks (optional).
  # Prefer the DISCORD_WEBHOOK_URL / TEAMS_WEBHOOK_URL environment variables.
  discord_webhook: null
  teams_webhook: null

  # Open a GitHub issue when a non-PR change is blocked (requires GitHub context).
  create_github_issue_on_block: false

  # Email SMTP configuration (optional)
  # Uncomment and configure to enable email notifications
  email_smtp: null
  # email_smtp:
  #   server: "smtp.gmail.com"
  #   port: 587
  #   username: "your-email@gmail.com"
  #   password: "your-app-password"
  #   from_email: "cicd-guardian@example.com"
  #   to_emails:
  #     - "team@example.com"
  #     - "devops@example.com"
  
  # Severity levels that trigger notifications
  alert_on:
    - critical
    - high

# Build monitoring thresholds
build_monitoring:
  # Maximum build duration in seconds (10 minutes)
  max_duration_seconds: 600
  
  # Automatically block merges (fail the CI check) for critical issues
  auto_block: true

