name: Test CI/CD Guardian Agent

on:
  push:
    branches: [ main, master, develop, feature/** ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Allow the agent (using the passed token) to post a Check Run and PR comment.
    permissions:
      contents: read
      checks: write
      pull-requests: write

    # The project lives in a subdirectory, so all `run` steps execute there.
    defaults:
      run:
        working-directory: cicd-guardian-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # full history so the diff-based policy checks work
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        id: install
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov httpx
      
      - name: Run tests with coverage
        id: test
        run: |
          # Run tests and generate coverage report.
          # A test failure fails the build (no continue-on-error).
          pytest --cov=src --cov-report=term --cov-report=json

          # Extract coverage percentage
          COVERAGE=$(python -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered'])")
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Test coverage: $COVERAGE%"
      
      - name: Security scan (simulate CVE check)
        id: security
        continue-on-error: true
        run: |
          # In a real scenario, use tools like:
          # - pip-audit
          # - safety check
          # - trivy
          # - snyk
          
          # For demo purposes, we'll simulate finding vulnerabilities
          echo "Running security scan..."
          pip install pip-audit || true
          pip-audit --format json > audit.json || echo '{"vulnerabilities": []}' > audit.json
          
          # Extract CVEs
          CVES=$(python -c "
          import json
          try:
              data = json.load(open('audit.json'))
              cves = []
              for vuln in data.get('vulnerabilities', []):
                  for alias in vuln.get('aliases', []):
                      if alias.startswith('CVE-'):
                          cves.append(alias)
              print(','.join(cves[:5]) if cves else '')
          except:
              print('')
          " || echo "")
          echo "cves=$CVES" >> $GITHUB_OUTPUT
      
      - name: Send analysis to Guardian Agent
        if: always()
        env:
          GUARDIAN_URL: ${{ secrets.GUARDIAN_AGENT_URL || 'http://localhost:8000' }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          # Ephemeral, repo-scoped token; the agent uses it to read PR review
          # state and post the Check Run / PR comment. Expires when the job ends.
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine pipeline status
          if [ "${{ steps.test.outcome }}" = "failure" ] || [ "${{ steps.install.outcome }}" = "failure" ]; then
            STATUS="failed"
          elif [ "${{ steps.test.outcome }}" = "cancelled" ]; then
            STATUS="aborted"
          else
            STATUS="success"
          fi
          
          # Get test coverage
          COVERAGE="${{ steps.test.outputs.coverage }}"
          if [ -z "$COVERAGE" ]; then
            COVERAGE="0"
          fi
          
          # Get CVEs
          CVES="${{ steps.security.outputs.cves }}"
          if [ -z "$CVES" ]; then
            CVES_JSON="[]"
          else
            # Convert comma-separated to JSON array
            CVES_JSON=$(echo "$CVES" | python -c "import sys, json; print(json.dumps(sys.stdin.read().strip().split(',')))")
          fi
          
          # Determine push vs PR. For PRs, use the PR head SHA (so the Check Run
          # lands on the PR) and let the agent fetch real approval data.
          IS_DIRECT_PUSH="false"
          COMMIT_SHA="${{ github.sha }}"
          PR_NUMBER_JSON="null"

          if [ "${{ github.event_name }}" = "push" ]; then
            IS_DIRECT_PUSH="true"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
            PR_NUMBER_JSON="${{ github.event.pull_request.number }}"
          fi

          # --- Diff-based policy signals (computed here in CI) ---
          # Resolve the base commit to diff against.
          DIFF_BASE=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF_BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            DIFF_BASE="${{ github.event.before }}"
          fi

          : > /tmp/diff.txt
          echo "[]" > /tmp/files.json
          if [ -n "$DIFF_BASE" ] && [ "$DIFF_BASE" != "0000000000000000000000000000000000000000" ]; then
            git diff "$DIFF_BASE" "$COMMIT_SHA" 2>/dev/null | head -c 200000 > /tmp/diff.txt || : > /tmp/diff.txt
            git diff --name-only "$DIFF_BASE" "$COMMIT_SHA" 2>/dev/null > /tmp/changed.txt || : > /tmp/changed.txt
            python - <<'PY'
import json, os
root = os.environ.get("GITHUB_WORKSPACE", ".")
files = []
try:
    for line in open("/tmp/changed.txt"):
        p = line.strip()
        full = os.path.join(root, p)
        if p and os.path.isfile(full):
            files.append({"path": p, "size_bytes": os.path.getsize(full)})
except Exception:
    pass
json.dump(files, open("/tmp/files.json", "w"))
PY
          fi

          # Redacted secret scan — runs in CI so raw secrets never leave the runner.
          python -c "
import json, sys
sys.path.insert(0, '.')
try:
    from src.scanners import scan_diff_for_secrets
    diff = open('/tmp/diff.txt', encoding='utf-8', errors='replace').read()
    print(json.dumps(scan_diff_for_secrets(diff)))
except Exception:
    print('[]')
" > /tmp/secrets.json || echo "[]" > /tmp/secrets.json

          # Calculate duration (approximate)
          DURATION=$SECONDS

          # Prepare payload. pr_approved / pr_reviewers_count are sent as null so
          # the agent resolves the real values from GitHub via github_pr_number.
          PAYLOAD=$(cat <<EOF
          {
            "pipeline_id": "${{ github.run_id }}",
            "status": "$STATUS",
            "duration_seconds": $DURATION,
            "logs": "GitHub Actions run #${{ github.run_number }} on ${{ github.ref_name }}",
            "vulnerabilities": $CVES_JSON,
            "branch": "${{ github.ref_name }}",
            "commit_sha": "$COMMIT_SHA",
            "test_coverage_percent": $COVERAGE,
            "is_direct_push": $IS_DIRECT_PUSH,
            "pr_approved": null,
            "pr_reviewers_count": null,
            "github_repo": "${{ github.repository }}",
            "github_pr_number": $PR_NUMBER_JSON,
            "github_token": "$GH_TOKEN"
          }
          EOF
          )

          # Merge the diff-derived signals into the payload (safely, via json).
          echo "$PAYLOAD" > /tmp/payload.json
          python - <<'PY'
import json
p = json.load(open("/tmp/payload.json"))
try:
    p["changed_files"] = json.load(open("/tmp/files.json"))
except Exception:
    p["changed_files"] = []
try:
    p["secrets_detected"] = json.load(open("/tmp/secrets.json"))
except Exception:
    p["secrets_detected"] = []
json.dump(p, open("/tmp/payload.json", "w"))
PY

          echo "Sending to Guardian Agent at: $GUARDIAN_URL"
          # NOTE: payload contains a token, so it is intentionally not echoed.

          # Send to Guardian Agent (X-API-Key only matters if the agent has
          # GUARDIAN_API_KEY set; an empty header is harmless otherwise)
          RESPONSE=$(curl -X POST "$GUARDIAN_URL/analyze" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $GUARDIAN_API_KEY" \
            -d @/tmp/payload.json \
            -w "\nHTTP_CODE:%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            -s || echo "CURL_FAILED")
          
          if [ "$RESPONSE" = "CURL_FAILED" ]; then
            echo "⚠️ Warning: Could not reach Guardian Agent at $GUARDIAN_URL"
            echo "This is normal if testing locally without ngrok/tunnel"
            exit 0
          fi
          
          # Extract HTTP code
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_CODE:")
          
          echo "Response Code: $HTTP_CODE"
          echo "Response Body: $BODY"
          
          # Parse response and display results
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Guardian Agent analysis complete!"
            
            # Extract key information
            SEVERITY=$(echo "$BODY" | python -c "import sys, json; data=json.load(sys.stdin); print(data.get('severity', 'unknown'))" 2>/dev/null || echo "unknown")
            ANOMALY_COUNT=$(echo "$BODY" | python -c "import sys, json; data=json.load(sys.stdin); print(len(data.get('anomalies', [])))" 2>/dev/null || echo "0")
            BLOCK_MERGE=$(echo "$BODY" | python -c "import sys, json; data=json.load(sys.stdin); print(data.get('block_merge', False))" 2>/dev/null || echo "false")

            echo "📊 Analysis Results:"
            echo "  - Severity: $SEVERITY"
            echo "  - Anomalies detected: $ANOMALY_COUNT"
            echo "  - Block merge: $BLOCK_MERGE"

            # Fail the job if critical issues found
            if [ "$SEVERITY" = "critical" ] && [ "$BLOCK_MERGE" = "True" ]; then
              echo "🚨 CRITICAL ISSUES DETECTED - Blocking merge!"
              echo "$BODY" | python -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print('\n📋 Issues found:')
              for anomaly in data.get('anomalies', []):
                  print(f\"  - [{anomaly['severity']}] {anomaly['description']}\")
              print(f'\n💡 Recommendation:\n{data.get(\"recommendation\", \"No recommendation available\")}')
          except:
              pass
          "
              exit 1
            fi
          else
            echo "⚠️ Warning: Guardian Agent returned HTTP $HTTP_CODE"
          fi
      
      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            // This would post Guardian Agent results as a PR comment
            // Requires additional setup
            console.log('PR comment feature - implement if needed');

